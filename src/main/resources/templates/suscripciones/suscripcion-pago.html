<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pago de Suscripción</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fb, #eef6ff);
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }

        .container{
            width: 100%;
            max-width: 750px;
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .title{
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #019bff;
            margin-bottom: 20px;
        }

        .section{
            margin-bottom: 20px;
        }

        .section h2,
        .section h3{
            margin-bottom: 10px;
            color: #333;
        }

        .info p{
            margin: 8px 0;
            font-size: 14px;
            color: #444;
        }

        .info b{
            color: #000;
        }

        .badge{
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #eef6ff;
            color: #019bff;
        }

        .btn-pay{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            color: white;
            background: linear-gradient(90deg, #019bff, #00bc9b);
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-pay:hover{
            opacity: 0.9;
        }

        .alert{
            color: #d9534f;
            font-weight: 600;
            text-align: center;
        }

        .back-link{
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #555;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover{
            color: #019bff;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 class="title">Pago de Suscripción</h1>

    <!-- RESUMEN PLAN -->
    <div class="section info">

        <h3>Resumen del Plan</h3>

        <p><b>Suscripción ID:</b> <span th:text="${suscripcion.id}"></span></p>

        <p><b>Plan:</b> 
            <span class="badge" th:text="${suscripcion.plan}"></span>
        </p>

        <p><b>Precio:</b> S/ <span th:text="${suscripcion.precio}"></span></p>

        <p><b>Estado:</b> <span th:text="${suscripcion.estado.nombre}"></span></p>

        <p><b>Inicio:</b> <span th:text="${suscripcion.fechaInicio}"></span></p>

        <p><b>Fin:</b> <span th:text="${suscripcion.fechaFin}"></span></p>

    </div>

    <!-- PAGO -->
    <div class="section">

        <h3>Pago</h3>

        <div th:if="${suscripcion.pago != null}" class="info">

            <p><b>Estado pago:</b> <span th:text="${suscripcion.pago.estado.nombre}"></span></p>

            <p><b>Método:</b> <span th:text="${suscripcion.pago.metodo}"></span></p>

            <p><b>Monto:</b> S/ <span th:text="${suscripcion.pago.monto}"></span></p>

            <form th:action="@{/api/pagos/confirmar/{id}(id=${suscripcion.pago.id})}"
                  method="post">

                <button type="submit" class="btn-pay">
                    Pagar ahora
                </button>

            </form>

        </div>

        <div th:if="${suscripcion.pago == null}" class="alert">
            Pago aún no generado
        </div>

    </div>

    <a class="back-link" th:href="@{/suscripciones}">
        ← Volver a planes
    </a>

</div>

</body>
</html>
