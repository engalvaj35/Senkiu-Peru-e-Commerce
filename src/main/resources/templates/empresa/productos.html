<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="_csrf"
          th:content="${_csrf.token}">

    <meta name="_csrf_header"
          th:content="${_csrf.headerName}">
        
    <link rel="stylesheet"
          th:href="@{/css/empresa/productos.css}">

    <title>Productos Empresa</title>
</head>

<body>

<div class="page-wrapper">

    <div class="topbar">

        <div>

            <span class="badge">
                Empresa
            </span>

            <h1>
                Gestión de Productos
            </h1>

            <p>
                Administra tus productos y solicitudes.
            </p>

        </div>

        <div class="top-actions">

            <a th:href="@{/empresa/dashboard}"
               class="btn-secondary">

                Dashboard
            </a>

            <a th:href="@{/empresa/ordenes}"
               class="btn-secondary">

                Órdenes
            </a>

        </div>

    </div>

    <div class="content-grid">

        <!-- FORMULARIO -->

        <div class="card form-card">

            <h2>
                Crear Solicitud
            </h2>

            <form id="formProducto"
                  enctype="multipart/form-data">

                <div class="input-group">

                    <label>
                        Nombre
                    </label>

                    <input type="text"
                           name="nombre"
                           required>

                </div>

                <div class="input-group">

                    <label>
                        Descripción
                    </label>

                    <textarea name="descripcion"
                              required></textarea>

                </div>

                <div class="two-columns">

                    <div class="input-group">

                        <label>
                            Precio
                        </label>

                        <input type="number"
                               step="0.01"
                               name="precio"
                               required>

                    </div>

                    <div class="input-group">

                        <label>
                            Stock
                        </label>

                        <input type="number"
                               name="stock"
                               required>

                    </div>

                </div>

                <div class="input-group">

                    <label>
                        Tiempo de entrega
                    </label>

                    <input type="text"
                           name="tiempoEntrega"
                           required>

                </div>

                <div class="input-group">

                    <label>
                        Categoría
                    </label>

                    <select name="categoriaId"
                            required>

                        <option value="">
                            Selecciona categoría
                        </option>

                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Imagen del producto
                    </label>

                    <label for="archivoInput"
                        class="file-upload">

                        <div class="upload-icon">
                            ⬆
                        </div>

                        <div class="upload-text">

                            <span>
                                Seleccionar imagen
                            </span>

                            <small id="fileName">
                                Ningún archivo seleccionado
                            </small>

                        </div>

                    </label>

                    <input type="file"
                        id="archivoInput"
                        name="archivo"
                        accept="image/*"
                        hidden
                        required>

                </div>

                <button type="submit"
                        class="btn-primary">

                    Enviar Solicitud

                </button>

            </form>

        </div>

        <div th:if="${productos == null or productos.isEmpty()}"
            class="empty-products">

            <div class="empty-icon">
                📦
            </div>

            <h3>¡Aún no tienes productos!</h3>

            <p>
                Crea tu primer producto para comenzar a vender en la plataforma.
            </p>

        </div>

        <!-- TABLA -->

        <div class="table-wrapper"
        th:if="${productos != null and !productos.isEmpty()}">

        <div class="card table-card">

            <div class="table-header">

                <h2>
                    Mis Productos
                </h2>

            </div>

            <div class="table-wrapper">

                <table>

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="p : ${productos}">

                        <td th:text="${p.id}"></td>

                        <td>

                            <img th:src="${p.imagenUrl}"
                                 class="product-img">

                        </td>

                        <td th:text="${p.nombre}"></td>

                        <td>
                            S/
                            <span th:text="${p.precio}"></span>
                        </td>

                        <td th:text="${p.stock}"></td>

                        <td th:text="${p.categoria}"></td>

                        <td>

                            <span class="status-badge"
                                  th:text="${p.estado}">
                            </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<div id="toast"
     class="toast">

    <span id="toastMessage"></span>

</div>

<script>

const form = document.getElementById("formProducto");

const token =
document.querySelector('meta[name="_csrf"]')
.getAttribute("content");

const header =
document.querySelector('meta[name="_csrf_header"]')
.getAttribute("content");

/* TOAST */

function showToast(message, type = "success") {

    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toastMessage");

    toastMessage.textContent = message;

    // reset
    toast.className = "toast";

    // fuerza reflow (evita bugs de render)
    void toast.offsetWidth;

    toast.classList.add("show", type);

    setTimeout(() => {
        toast.className = "toast";
    }, 3000);
}

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(form);

    const res = await fetch("/empresa/productos", {

        method: "POST",
        body: formData,
        headers: {
            [header]: token
        }
    });

    if (!res.ok) {

        const error = await res.text();

        showToast(error || "Error al enviar solicitud", "error");

        return;
    }

    showToast("Solicitud enviada correctamente", "success");

    setTimeout(() => location.reload(), 1200);
});

</script>
<script>

const archivoInput =
    document.getElementById("archivoInput");

const fileName =
    document.getElementById("fileName");

archivoInput.addEventListener("change", function () {

    if (this.files.length > 0) {

        fileName.textContent =
            this.files[0].name;

    } else {

        fileName.textContent =
            "Ningún archivo seleccionado";
    }
});

</script>
</body>
</html>
