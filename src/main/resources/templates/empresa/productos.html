<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="_csrf"
          th:content="${_csrf.token}">

    <meta name="_csrf_header"
          th:content="${_csrf.headerName}">
        
    <link rel="stylesheet"
          th:href="@{/css/empresa/productos.css}">

    <title>Productos Empresa</title>
    <link rel="icon" href="https://scontent.flim38-1.fna.fbcdn.net/v/t39.30808-6/301370567_514129550712166_921891752961438295_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=l4NrsDsVM64Q7kNvwFqxiF9&_nc_oc=AdqqvZod6ACSbWMc9-JhzAkB9ukvT8U1img3hbY4ersE3vnGwizV6mmW_OXmVFn0dyo&_nc_zt=23&_nc_ht=scontent.flim38-1.fna&_nc_gid=0SeuIHSKSJOIGzjyHP8PKA&_nc_ss=7b2a8&oh=00_Af5uQEPVEyo7vlOSdn5_sUGKws12WLg-uw7drOHr_31sqQ&oe=6A1BA100" type="image/x-icon">
</head>

<body>

<div class="page-wrapper">

    <div class="topbar">

        <div>

            <span class="badge">
                Empresa
            </span>

            <h1>
                Gestión de Productos
            </h1>

            <p>
                Administra tus productos y solicitudes.
            </p>

        </div>

        <div class="top-actions">

            <a th:href="@{/empresa/dashboard}"
               class="btn-secondary">

                Dashboard
            </a>

            <a th:href="@{/empresa/ordenes}"
               class="btn-secondary">

                Órdenes
            </a>

        </div>

    </div>

    <div class="content-grid">

        <!-- FORMULARIO -->

        <div class="card form-card">

            <h2>
                Crear Solicitud
            </h2>

            <form id="formProducto"
                  enctype="multipart/form-data">

                <div class="input-group">

                    <label>
                        Nombre
                    </label>

                    <input type="text"
                           name="nombre"
                           required>

                </div>

                <div class="input-group">

                    <label>
                        Descripción
                    </label>

                    <textarea name="descripcion"
                              required></textarea>

                </div>

                <div class="two-columns">

                    <div class="input-group">

                        <label>
                            Precio
                        </label>

                        <input type="number"
                               step="0.01"
                               name="precio"
                               required>

                    </div>

                    <div class="input-group">

                        <label>
                            Stock
                        </label>

                        <input type="number"
                               name="stock"
                               required>

                    </div>

                </div>

                <div class="input-group">

                    <label>
                        Tiempo de entrega
                    </label>

                    <input type="text"
                           name="tiempoEntrega"
                           required>

                </div>

                <div class="input-group">

                    <label>
                        Categoría
                    </label>

                    <select name="categoriaId"
                            required>

                        <option value="">
                            Selecciona categoría
                        </option>

                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Imagen del producto
                    </label>

                    <label for="archivoInput"
                        class="file-upload">

                        <div class="upload-icon">
                            ⬆
                        </div>

                        <div class="upload-text">

                            <span>
                                Seleccionar imagen
                            </span>

                            <small id="fileName">
                                Ningún archivo seleccionado
                            </small>

                        </div>

                    </label>

                    <input type="file"
                        id="archivoInput"
                        name="archivo"
                        accept="image/*"
                        hidden
                        required>

                </div>

                <button type="submit"
                        class="btn-primary">

                    Enviar Solicitud

                </button>

            </form>

        </div>

        <div th:if="${productos == null or productos.isEmpty()}"
            class="empty-products">

            <div class="empty-icon">
                📦
            </div>

            <h3>¡Aún no tienes productos!</h3>

            <p>
                Crea tu primer producto para comenzar a vender en la plataforma.
            </p>

        </div>

        <!-- TABLA -->

        <div class="table-wrapper"
        th:if="${productos != null and !productos.isEmpty()}">

        <div class="card table-card">

            <div class="table-header">

                <h2>
                    Mis Productos
                </h2>

            </div>

            <div class="table-wrapper">

                <table>

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="p : ${productos}">

                        <td th:text="${p.id}"></td>

                        <td>

                            <img th:src="${p.imagenUrl}"
                                 class="product-img">

                        </td>

                        <td th:text="${p.nombre}"></td>

                        <td>
                            S/
                            <span th:text="${p.precio}"></span>
                        </td>

                        <td th:text="${p.stock}"></td>

                        <td th:text="${p.categoria}"></td>

                        <td>

                            <span class="status-badge"
                                  th:text="${p.estado}">
                            </span>

                        </td>

                        <td>

                            <button
                                th:if="${p.estado == 'PUBLICADO'}"
                                class="btn-edit"
                                th:attr="
                                    data-id=${p.id},
                                    data-precio=${p.precio},
                                    data-stock=${p.stock}
                                ">

                                Editar

                            </button>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<div id="editModal"
     class="modal">

    <div class="modal-content">

        <h3>
            Editar Producto
        </h3>

        <input type="hidden"
               id="editId">

        <div class="input-group">

            <label>
                Precio
            </label>

            <input type="number"
                   step="0.01"
                   id="editPrecio">

        </div>

        <div class="input-group">

            <label>
                Stock a agregar
            </label>

            <input type="number"
                   id="editStock">
            
            <small id="stockActualInfo"></small>

        </div>

        <div class="modal-actions">

            <button id="btnGuardar"
                    class="btn-primary">

                Guardar

            </button>

            <button id="btnCerrar"
                    class="btn-secondary">

                Cancelar

            </button>

        </div>

    </div>

</div>

<div id="toast"
     class="toast">

    <span id="toastMessage"></span>

</div>

<script>

const form = document.getElementById("formProducto");

const token =
document.querySelector('meta[name="_csrf"]')
.getAttribute("content");

const header =
document.querySelector('meta[name="_csrf_header"]')
.getAttribute("content");

/* TOAST */

function showToast(message, type = "success") {

    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toastMessage");

    toastMessage.textContent = message;

    // reset
    toast.className = "toast";

    // fuerza reflow (evita bugs de render)
    void toast.offsetWidth;

    toast.classList.add("show", type);

    setTimeout(() => {
        toast.className = "toast";
    }, 3000);
}

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(form);

    const res = await fetch("/empresa/productos", {

        method: "POST",
        body: formData,
        headers: {
            [header]: token
        }
    });

    if (!res.ok) {

        const error = await res.text();

        showToast(error || "Error al enviar solicitud", "error");

        return;
    }

    showToast("Solicitud enviada correctamente", "success");

    setTimeout(() => location.reload(), 1200);
});

</script>
<script>

const archivoInput =
    document.getElementById("archivoInput");

const fileName =
    document.getElementById("fileName");

archivoInput.addEventListener("change", function () {

    if (this.files.length > 0) {

        fileName.textContent =
            this.files[0].name;

    } else {

        fileName.textContent =
            "Ningún archivo seleccionado";
    }
});

</script>

<script>

const modal =
    document.getElementById("editModal");

const editId =
    document.getElementById("editId");

const editPrecio =
    document.getElementById("editPrecio");

const editStock =
    document.getElementById("editStock");

const stockActualInfo =
    document.getElementById("stockActualInfo");

/* =========================
   ABRIR MODAL
========================= */

document
.querySelectorAll(".btn-edit")
.forEach(btn => {

    btn.addEventListener("click", () => {

        editId.value =
            btn.dataset.id;

        editPrecio.value =
            btn.dataset.precio;

        /* stock a agregar */
        editStock.value = "";

        stockActualInfo.textContent =
            "Stock actual: " +
            btn.dataset.stock;

        modal.style.display =
            "flex";
    });
});

/* =========================
   CERRAR MODAL
========================= */

document
.getElementById("btnCerrar")
.addEventListener("click", () => {

    modal.style.display =
        "none";
});

/* =========================
   GUARDAR CAMBIOS
========================= */

document
.getElementById("btnGuardar")
.addEventListener("click", async () => {

    const id =
        editId.value;

    const precio =
        editPrecio.value.trim();

    const stock =
        editStock.value.trim();

    if (precio !== "" && Number(precio) < 0) {

        showToast(
            "El precio no puede ser negativo",
            "error"
        );

        return;
    }

    if (stock !== "" && Number(stock) < 0) {

        showToast(
            "El stock a agregar no puede ser negativo",
            "error"
        );

        return;
    }

    if (precio === "" && stock === "") {

        showToast(
            "Debes modificar al menos un campo",
            "error"
        );

        return;
    }

    const formData =
        new FormData();

    if (precio !== "") {

        formData.append(
            "precio",
            precio
        );
    }

    if (stock !== "") {

        formData.append(
            "stock",
            stock
        );
    }

    const res = await fetch(

        `/empresa/productos/${id}/editar`,

        {
            method: "POST",
            body: formData,
            headers: {
                [header]: token
            }
        }
    );

    if (!res.ok) {

        let errorMessage = "Error al actualizar";

    try {

        const data = await res.json();

        errorMessage =
            data.error ||
            data.message ||
            errorMessage;

    } catch {

        errorMessage =
            await res.text();
    }

    showToast(
        errorMessage,
        "error"
    );

        return;
    }

    showToast(
        "Producto actualizado correctamente",
        "success"
    );

    /* cerrar modal */
    modal.style.display =
        "none";

    setTimeout(
        () => location.reload(),
        1000
    );
});

</script>

</body>
</html>
