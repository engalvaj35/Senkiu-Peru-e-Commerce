<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pago Donación</title>

    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-KI8DMbijtGX0fTcbdNgf8EpB3gQv7s0R5A&s" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #019bff, #00bc9b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pay-box {
            background: white;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }

        .info {
            margin-bottom: 12px;
            font-size: 15px;
        }

        .label {
            font-weight: 600;
        }

        .btn-pay {
            width: 100%;
            margin-top: 20px;
            background: linear-gradient(90deg, #019bff, #00bc9b);
            border: none;
            padding: 10px;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.2s;
        }

        .btn-pay:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #555;
            text-decoration: none;
        }

        .back-link:hover {
            color: #019bff;
        }
    </style>
</head>

<body>

<div class="pay-box">

    <h1>Confirmar Donación</h1>

    <div class="info">
        <span class="label">Programa:</span>
        <span th:text="${donacion.programa.nombre}"></span>
    </div>

    <div class="info">
        <span class="label">Monto:</span>
        S/
        <span th:text="${donacion.monto}"></span>
    </div>

    <hr>

    <form th:action="@{/api/pagos/confirmar/{id}(id=${donacion.pago.id})}"
          method="post">

        <button type="submit" class="btn-pay">
            Donar ahora
        </button>

    </form>

    <a href="/programas" class="back-link">
        Volver
    </a>

</div>

</body>
</html>
