<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Registro Senkiu</title>

    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-KI8DMbijtGX0fTcbdNgf8EpB3gQv7s0R5A&s" type="image/x-icon">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body class="bg-light">

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 450px;">

        <!-- TITULO -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">Crear Cuenta</h2>
            <p class="text-muted mb-0">Regístrate en Senkiu</p>
        </div>

        <!-- ALERTA ERROR -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <!-- FORMULARIO -->
        <form th:action="@{/auth/register}" method="post"
            th:object="${registerRequest}">
            <!-- NOMBRES -->
            <div class="mb-3">
            	<label class="form-label fw-bold">Nombres</label>
            	<div class="input-group d-flex">
	            	<span class="input-group-text"><i class="bi bi-person"></i></span>
	                <input type="text"
                        th:field="*{nombres}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('nombres')} ? 'is-invalid' : ''"
                        placeholder="Ingrese sus nombres">

                    <div class="invalid-feedback"
                        th:if="${#fields.hasErrors('nombres')}"
                        th:errors="*{nombres}">
                    </div>
            	</div>
            </div>
			
            <!-- EMAIL -->
            <div class="mb-3">
                <label class="form-label fw-bold">Correo Electrónico</label>
                <div class="input-group d-flex">
	            	<span class="input-group-text"><i class="bi bi-envelope"></i></span>
	                <input type="email"
                        th:field="*{email}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                        placeholder="correo@ejemplo.com">

                    <div class="invalid-feedback"
                        th:if="${#fields.hasErrors('email')}"
                        th:errors="*{email}">
                    </div>
            	</div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                <div class="input-group d-flex">
	            	<span class="input-group-text"><i class="bi bi-key"></i></span>
	                <input type="password"
                        th:field="*{password}"
                        class="form-control"
                        th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                        placeholder="Ingrese su contraseña">

                    <div class="invalid-feedback"
                        th:if="${#fields.hasErrors('password')}"
                        th:errors="*{password}">
                    </div>
	            </div>
            </div>

            <!-- BOTON REGISTRO -->
            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">Registrarse</button>
            </div>
        </form>

        <!-- LOGIN -->
        <div class="text-center mt-4">
            <div class="mb-3">
                <span class="text-muted">¿Ya tienes cuenta?</span>
                <a th:href="@{/login-page}" class="text-decoration-none fw-semibold">
                    Iniciar Sesión
                </a>
            </div>

            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Volver al Inicio
            </a>
        </div>
                
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
