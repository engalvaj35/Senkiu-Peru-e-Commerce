<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    #successAlert {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        min-width: 350px;

        opacity: 0;
        transform: translateY(-20px);

        transition:
            opacity 0.6s ease,
            transform 0.6s ease;
    }

    #successAlert.show {
        opacity: 1;
        transform: translateY(0);
    }

    #successAlert.hide {
        opacity: 0;
        transform: translateY(-20px);
    }
    </style>

    <title>Login Senkiu</title>

    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-KI8DMbijtGX0fTcbdNgf8EpB3gQv7s0R5A&s" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0 rounded-4 p-4"
         style="width: 100%; max-width: 450px;">

        <!-- TITULO -->
        <div class="text-center mb-4">
            <h2 class="fw-bold">Iniciar Sesión</h2>
            <p class="text-muted mb-0">Accede a tu cuenta de Senkiu
            </p>

        </div>

        <!-- ALERTA ERROR -->
        <div th:if="${param.error}" class="alert alert-danger">Credenciales incorrectas.</div>

        <!-- ALERTA LOGOUT -->
        <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada correctamente.</div>

        <div th:if="${param.registered}" id="successAlert" class="alert alert-success"><i class="bi bi-check-circle-fill me-2"></i>Registro realizado correctamente. Ahora puedes iniciar sesión.</div>

        <!-- FORMULARIO -->
        <form method="POST" th:action="@{/login}">

            <!-- EMAIL -->
            <div class="mb-3">
	            <label class="form-label fw-bold">Correo Electrónico</label>
	            <div class="input-group d-flex">
	            	<span class="input-group-text"><i class="bi bi-envelope"></i></span>
	                <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
				</div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                <div class="input-group d-flex">
	            	<span class="input-group-text"><i class="bi bi-key"></i></span>
	                <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
	            </div>
            </div>

            <!-- BOTON LOGIN -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Iniciar Sesión</button>
            </div>
        </form>
        
        <!-- REGISTRO -->
        <div class="text-center mt-4">

            <div class="mb-3">
                <span class="text-muted">¿No tienes cuenta?</span>
                <a th:href="@{/auth/register}" class="text-decoration-none fw-semibold">
                    Registrarse
                </a>
            </div>

            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Volver al Inicio
            </a>

        </div>
	
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const alert = document.getElementById("successAlert");

    if (alert) {

        setTimeout(() => {
            alert.classList.add("show");
        }, 100);

        setTimeout(() => {
            alert.classList.remove("show");
            alert.classList.add("hide");

            setTimeout(() => {
                alert.remove();
            }, 600);

        }, 3000);
    }
});
</script>

</body>
</html>
