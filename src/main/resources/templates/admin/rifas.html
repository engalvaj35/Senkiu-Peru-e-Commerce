<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Rifas - Admin</title>

    <link rel="icon" href="https://scontent.flim38-1.fna.fbcdn.net/v/t39.30808-6/301370567_514129550712166_921891752961438295_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=l4NrsDsVM64Q7kNvwFqxiF9&_nc_oc=AdqqvZod6ACSbWMc9-JhzAkB9ukvT8U1img3hbY4ersE3vnGwizV6mmW_OXmVFn0dyo&_nc_zt=23&_nc_ht=scontent.flim38-1.fna&_nc_gid=0SeuIHSKSJOIGzjyHP8PKA&_nc_ss=7b2a8&oh=00_Af5uQEPVEyo7vlOSdn5_sUGKws12WLg-uw7drOHr_31sqQ&oe=6A1BA100" type="image/x-icon">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link rel="stylesheet" th:href="@{/css/admin/rifas.css}">
</head>

<body>

<div class="page-wrapper">

    <header class="header">

        <div>
            <h1>Gestión de Rifas</h1>
            <p>Administra rifas activas, rechazadas y revisa el estado de cada campaña solidaria.</p>
        </div>

        <div class="actions">
            <a class="btn-back" th:href="@{/admin/dashboard}">
                ← Dashboard
            </a>

            <a class="btn-secondary" th:href="@{/admin/rifas/pendientes}">
                Revisar Pendientes
            </a>
        </div>

    </header>

    <section class="grid-section">

        <div class="panel">
            <h2>Rifas Activas</h2>
            <div id="tabla-rifas-activas" class="grid"></div>
        </div>

        <div class="panel">
            <h2>Rifas Rechazadas</h2>
            <div id="tabla-rifas-rechazadas" class="grid"></div>
        </div>

    </section>

</div>

<script>

const token = document.querySelector('meta[name="_csrf"]').content;
const header = document.querySelector('meta[name="_csrf_header"]').content;

async function cargarRifasActivas() {

    const res = await fetch("/api/admin/rifas/activas");
    const data = await res.json();

    const cont = document.getElementById("tabla-rifas-activas");

    cont.innerHTML = "";

    if (!data || data.length === 0) {
        cont.innerHTML = `
            <div class="empty-card">
                <h3>No hay rifas activas</h3>
                <p>No existen rifas en curso en este momento.</p>
            </div>
        `;
        return;
    }

    data.forEach(rifa => {

        const disponibles = rifa.stockTickets - rifa.ticketsVendidos;

        cont.innerHTML += `
            <div class="card">
                <h3>${rifa.titulo}</h3>

                <p><b>Programa:</b> ${rifa.programaNombre}</p>
                <p><b>ONG:</b> ${rifa.ongNombre}</p>
                <p><b>Tickets:</b> ${rifa.ticketsVendidos}/${rifa.stockTickets}</p>
                <p><b>Disponibles:</b> ${disponibles}</p>
                <p><b>Precio:</b> S/ ${rifa.precioTicket}</p>
                <p><b>Estado:</b> ${formatEstado(rifa.estado)}</p>

                <a href="/admin/rifas/tickets?rifaId=${rifa.id}" class="btn">
                    Ver Tickets
                </a>
            </div>
        `;
    });
}

async function cargarRifasRechazadas() {

    const res = await fetch("/api/admin/rifas/rechazadas");
    const data = await res.json();

    const cont = document.getElementById("tabla-rifas-rechazadas");

    cont.innerHTML = "";

    if (!data || data.length === 0) {
        cont.innerHTML = `
            <div class="empty-card">
                <h3>No hay rifas rechazadas</h3>
                <p>No existen registros de rifas rechazadas.</p>
            </div>
        `;
        return;
    }

    data.forEach(rifa => {

        cont.innerHTML += `
            <div class="card rejected">
                <h3>${rifa.titulo}</h3>

                <p><b>Programa:</b> ${rifa.programaNombre}</p>
                <p><b>ONG:</b> ${rifa.ongNombre}</p>
                <p><b>Tickets:</b> ${rifa.ticketsVendidos}/${rifa.stockTickets}</p>
                <p><b>Estado:</b> ${rifa.estado}</p>
            </div>
        `;
    });
}

cargarRifasActivas();
cargarRifasRechazadas();

function formatEstado(estado) {
    return estado
        .toLowerCase()
        .replaceAll("_", " ")
        .replace(/\b\w/g, l => l.toUpperCase());
}

</script>

</body>
</html>
