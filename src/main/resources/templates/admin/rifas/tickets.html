<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tickets de Rifa</title>

    <link rel="icon" href="https://scontent.flim38-1.fna.fbcdn.net/v/t39.30808-6/301370567_514129550712166_921891752961438295_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=l4NrsDsVM64Q7kNvwFqxiF9&_nc_oc=AdqqvZod6ACSbWMc9-JhzAkB9ukvT8U1img3hbY4ersE3vnGwizV6mmW_OXmVFn0dyo&_nc_zt=23&_nc_ht=scontent.flim38-1.fna&_nc_gid=0SeuIHSKSJOIGzjyHP8PKA&_nc_ss=7b2a8&oh=00_Af5uQEPVEyo7vlOSdn5_sUGKws12WLg-uw7drOHr_31sqQ&oe=6A1BA100" type="image/x-icon">

    <link rel="stylesheet" href="/css/admin/rifas-tickets.css">
</head>

<body>

<div class="page-wrapper">

    <header class="header">

        <div>
            <h1>Tickets de la Rifa</h1>
            <p>Listado completo de tickets vendidos y sus usuarios asociados.</p>
        </div>

        <a class="btn-back" href="/admin/rifas">
            ← Gestión de Rifas
        </a>

    </header>

    <div class="table-wrapper">

        <table>

            <thead>
                <tr>
                    <th>Código Ticket</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rifa</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                </tr>
            </thead>

            <tbody id="tabla-tickets"></tbody>

        </table>

        <!-- EMPTY STATE -->
        <div id="empty-state" class="empty-state" style="display:none;">
            <h3>No hay tickets registrados</h3>
            <p>Esta rifa aún no tiene compras realizadas.</p>
        </div>

    </div>

</div>

<script>

function formatearEstado(estado) {
    if (!estado) return "";

    return estado
        .toLowerCase()
        .replaceAll("_", " ")
        .split(" ")
        .map(p => p.charAt(0).toUpperCase() + p.slice(1))
        .join(" ");
}

const rifaId = new URLSearchParams(window.location.search).get("rifaId");

fetch(`/admin/api/rifas/${rifaId}/tickets`)
.then(r => r.json())
.then(data => {

    const tabla = document.getElementById("tabla-tickets");
    const empty = document.getElementById("empty-state");

    tabla.innerHTML = "";

    if (!data || data.length === 0) {
        empty.style.display = "block";
        return;
    }

    empty.style.display = "none";

    data.forEach(t => {

        tabla.innerHTML += `
        <tr>
            <td class="code">${t.codigo}</td>
            <td>${t.usuarioNombre}</td>
            <td>${t.usuarioEmail}</td>
            <td>${t.rifaTitulo}</td>
            <td>${t.fechaCompra.replace("T"," ")}</td>
            <td><span class="status">${formatearEstado(t.estado)}</span></td>
        </tr>`;
    });

});

</script>

</body>
</html>
