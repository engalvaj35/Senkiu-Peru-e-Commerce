<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Usuarios - Admin</title>

    <link rel="stylesheet" th:href="@{/css/admin/usuarios.css}">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<body>

<div class="page-wrapper">

    <!-- HEADER -->
    <header class="topbar">

        <div>
            <h1>Gestión de Usuarios</h1>
            <p>Administra roles, estados y permisos del sistema</p>
        </div>

        <a th:href="@{/admin/dashboard}" class="btn-back">
            ← Volver
        </a>

    </header>

    <!-- TABLE -->
    <section class="table-container">

        <table class="users-table">

            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="u : ${usuarios}">

                <td th:text="${u.id}"></td>
                <td th:text="${u.nombres}"></td>
                <td th:text="${u.email}"></td>

                <td>
                    <span class="badge role" th:text="${u.rol}"></span>
                </td>

                <td>
                    <span class="badge state" th:text="${u.estado}"></span>
                </td>

                <td class="actions">

                    <button class="btn admin"
                            th:onclick="'hacerAdmin(' + ${u.id} + ')'">
                        ADMIN
                    </button>

                    <button class="btn user"
                            th:onclick="'hacerUser(' + ${u.id} + ')'">
                        USER
                    </button>

                    <button class="btn warn"
                            th:onclick="'suspenderUsuario(' + ${u.id} + ')'">
                        Suspender
                    </button>

                    <button class="btn success"
                            th:onclick="'activarUsuario(' + ${u.id} + ')'">
                        Activar
                    </button>

                </td>

            </tr>

            </tbody>

        </table>

    </section>

</div>

<script>

const token = document.querySelector('meta[name="_csrf"]').content;
const header = document.querySelector('meta[name="_csrf_header"]').content;

async function hacerAdmin(id) {
    await fetch(`/admin/api/usuarios/${id}/rol?rol=ROLE_ADMIN`, {
        method: "PUT",
        headers: { [header]: token }
    });
    location.reload();
}

async function hacerUser(id) {
    await fetch(`/admin/api/usuarios/${id}/rol?rol=ROLE_USER`, {
        method: "PUT",
        headers: { [header]: token }
    });
    location.reload();
}

async function suspenderUsuario(id) {
    await fetch(`/admin/api/usuarios/${id}/suspender`, {
        method: "PUT",
        headers: { [header]: token }
    });
    location.reload();
}

async function activarUsuario(id) {
    await fetch(`/admin/api/usuarios/${id}/activar`, {
        method: "PUT",
        headers: { [header]: token }
    });
    location.reload();
}

</script>

</body>
</html>
