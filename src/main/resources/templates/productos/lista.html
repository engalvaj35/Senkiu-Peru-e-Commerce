<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- GLOBAL -->
    <link rel="stylesheet" th:href="@{/css/layout-tienda.css}">

    <!-- 🔥 CSS ESPECÍFICO DE PRODUCTOS -->
    <link rel="stylesheet" th:href="@{/css/productos/lista.css}">
</head>

<body>

<div th:replace="~{fragments/layout-tienda :: navbar}"></div>

<!-- CONTENIDO -->
<main class="container productos-wrapper">

    <h1 class="titulo-seccion">Productos</h1>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${#lists.isEmpty(productos)}">
        <p class="text-muted">No hay productos disponibles.</p>
    </div>

    <div class="row g-4">

        <div class="col-md-4" th:each="p : ${productos}">

            <div class="producto-card">

                <img class="producto-img" th:src="${p.imagenUrl}" alt="Producto">

                <div class="producto-body">

                    <h5 th:text="${p.nombre}" class="producto-nombre"></h5>

                    <p class="producto-precio">
                        S/ <span th:text="${p.precio}"></span>
                    </p>

                    <p class="producto-meta">
                        <span th:text="${p.categoria}"></span> •
                        <span th:text="${p.empresa}"></span>
                    </p>

                    <div sec:authorize="isAuthenticated()" class="acciones">

                        <form th:action="@{/carrito/agregar}" method="post" class="d-flex gap-2">

                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <input type="hidden" name="productoId" th:value="${p.id}">

                            <input type="number"
                                   name="cantidad"
                                   value="1"
                                   min="1"
                                   class="form-control cantidad-input">

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-cart"></i> Agregar
                            </button>

                        </form>

                        <a class="link-carrito"
                           th:href="@{/carrito/{empresaId}(empresaId=${p.empresaId})}">
                            Ver carrito de esta empresa
                        </a>

                    </div>

                </div>
            </div>

        </div>

    </div>

</main>

<div th:replace="~{fragments/layout-tienda :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
