<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-KI8DMbijtGX0fTcbdNgf8EpB3gQv7s0R5A&s" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <link rel="stylesheet" th:href="@{/css/layout-tienda.css}">

    <link rel="stylesheet" th:href="@{/css/productos/lista.css}">
</head>

<body>

<div th:replace="~{fragments/layout-tienda :: navbar}"></div>

<!-- CONTENIDO -->
<main class="container productos-wrapper">

    <h1 class="titulo-seccion">Productos</h1>

    <form method="get"
        th:action="@{/productos}"
        class="mb-4">

        <div class="row g-2">

            <div class="col-md-5">

                <input type="text"
                    name="nombre"
                    th:value="${nombre}"
                    class="form-control"
                    placeholder="Buscar producto">

            </div>

            <div class="col-md-4">

                <select name="categoria"
                        class="form-select">

                    <option value="">
                        Todas las categorías
                    </option>

                    <option
                            th:each="c : ${categorias}"
                            th:value="${c.nombre}"
                            th:text="${c.nombre}"
                            th:selected="${categoria == c.nombre}">
                    </option>

                </select>

            </div>

            <div class="col-md-3">

                <button
                        type="submit"
                        class="btn btn-primary w-100">

                    Buscar

                </button>

            </div>

        </div>

    </form>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${#lists.isEmpty(productos)}" 
    class="alert alert-info text-center"> No hay productos disponibles.</p>
    </div>

    <div class="row g-4">

        <div class="col-md-4" th:each="p : ${productos}">

            <div class="producto-card">

                <img class="producto-img" th:src="${p.imagenUrl}" alt="Producto">

                <div class="producto-body">

                    <h5 th:text="${p.nombre}" class="producto-nombre"></h5>

                    <p class="producto-precio">
                        S/ <span th:text="${p.precio}"></span>
                    </p>

                    <p class="producto-meta">
                        <span th:text="${p.categoria}"></span> •
                        <span th:text="${p.empresa}"></span>
                    </p>

                    <!-- BOTÓN DETALLE -->
                    <button class="btn btn-outline-primary w-100 mb-2"
                            type="button"
                            data-bs-toggle="modal"
                            data-bs-target="#productoModal"
                            th:attr="data-nombre=${p.nombre},
                                    data-precio=${p.precio},
                                    data-stock=${p.stock},
                                    data-categoria=${p.categoria},
                                    data-empresa=${p.empresa},
                                    data-imagen=${p.imagenUrl},
                                    data-descripcion=${p.descripcion}">
                        Ver detalles
                    </button>

                        <div th:if="${p.stock > 0}">

                            <form th:action="@{/carrito/agregar}" method="post" class="d-flex gap-2">

                                <input type="hidden"
                                    th:name="${_csrf.parameterName}"
                                    th:value="${_csrf.token}">

                                <input type="hidden" name="productoId" th:value="${p.id}">

                                <input type="number"
                                    name="cantidad"
                                    value="1"
                                    min="1"
                                    th:max="${p.stock}"
                                    class="form-control cantidad-input">

                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-cart"></i> Agregar
                                </button>

                            </form>

                            <a class="link-carrito"
                            th:href="@{/carrito/{empresaId}(empresaId=${p.empresaId})}">
                                Ver carrito de esta empresa
                            </a>

                        </div>

                    <div th:if="${p.stock <= 0}">
                        <button class="btn btn-secondary w-100" disabled>
                            Agotado
                        </button>
                    </div>

                </div>
            </div>

        </div>

    </div>

</main>

<div class="modal fade" id="productoModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalNombre"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="row">

                    <!-- IMAGEN -->
                    <div class="col-md-5">
                        <img id="modalImagen" class="img-fluid rounded w-100 modal-img" />
                    </div>

                    <!-- INFO -->
                    <div class="col-md-7">

                        <p class="text-primary fw-bold fs-4">
                            S/ <span id="modalPrecio"></span>
                        </p>

                        <p><strong>Categoría:</strong> <span id="modalCategoria"></span></p>
                        <p><strong>Empresa:</strong> <span id="modalEmpresa"></span></p>
                        <p><strong>Stock:</strong> <span id="modalStock"></span></p>

                        <hr>

                        <p class="fw-semibold">Descripción</p>
                        <p id="modalDescripcion" class="text-muted"></p>

                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments/layout-tienda :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/layout-tienda.js}"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const modal = document.getElementById("productoModal");

    modal.addEventListener("show.bs.modal", function (event) {

        const button = event.relatedTarget;

        document.getElementById("modalNombre").textContent = button.getAttribute("data-nombre");
        document.getElementById("modalPrecio").textContent = button.getAttribute("data-precio");
        document.getElementById("modalStock").textContent = button.getAttribute("data-stock");
        document.getElementById("modalCategoria").textContent = button.getAttribute("data-categoria");
        document.getElementById("modalEmpresa").textContent = button.getAttribute("data-empresa");
        document.getElementById("modalDescripcion").textContent = button.getAttribute("data-descripcion");

        document.getElementById("modalImagen").src = button.getAttribute("data-imagen");
    });

});
</script>
</body>
</html>
