<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Pago de Orden</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-KI8DMbijtGX0fTcbdNgf8EpB3gQv7s0R5A&s" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fb, #eef6ff);
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }

        .order-box {
            width: 100%;
            max-width: 850px;
        }

        .title {
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            color: #019bff;
        }

        .card-senkiu{
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .total {
            font-size: 22px;
            font-weight: 800;
            color: #00bc9b;
        }

        .estado {
            font-weight: 600;
            color: #019bff;
        }
        .fecha {
            font-weight: 600;
            color: #019bff;
        }

        .item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .item:last-child {
            border-bottom: none;
        }

        .btn-pay {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            color: white;
            background: linear-gradient(90deg, #019bff, #00bc9b);
            transition: 0.2s;
        }

        .btn-pay:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #555;
            text-decoration: none;
        }

        .back-link:hover {
            color: #019bff;
        }
    </style>
</head>

<body>

<div class="order-box">

    <h1 class="title">Pago de Orden</h1>

    <div class="card-senkiu">

        <!-- RESUMEN -->
        <div class="text-center mb-4">

            <p class="total">
                Total: S/ <span th:text="${orden.total}"></span>
            </p>

            <p>
                Estado:
                <span class="estado"
                    th:text="${estadoFormatter.formatear(
                            orden.estado.nombre
                    )}">
                </span>
            </p>

            <p class="mb-0">
                Fecha:
                <span class="estado"
                    th:text="${#temporals.format(
                            orden.createdAt,
                            'dd/MM/yyyy HH:mm'
                    )}">
                </span>
            </p>

        </div>

        <hr>

        <!-- PRODUCTOS -->
        <h3>Productos</h3>

        <div th:each="item : ${orden.detalles}" class="item">

            🛒 <b th:text="${item.producto.nombre}"></b>
            | Cant: <span th:text="${item.cantidad}"></span>
            | Precio: S/ <span th:text="${item.precio}"></span>
            | Subtotal: S/ <span th:text="${item.precio * item.cantidad}"></span>

        </div>

        <hr>

        <!-- PAGO -->
        <div class="text-center mt-3">

            <div th:if="${orden.pago != null}">

                <form th:action="@{/api/pagos/confirmar/{id}(id=${orden.pago.id})}"
                      method="post">

                    <button type="submit" class="btn-pay">
                        Pagar ahora
                    </button>

                </form>

            </div>

            <div th:if="${orden.pago == null}">
                <p class="text-danger fw-bold">
                    Pago aún no generado
                </p>
            </div>

        </div>

        <hr>

        <h3>Datos de entrega</h3>

        <p>
            <strong>Email:</strong>
            <span th:text="${
                orden.emailContacto != null &&
                !#strings.isEmpty(orden.emailContacto)
                    ? orden.emailContacto
                    : 'No cuenta con información registrada'
            }"></span>
        </p>

        <p>
            <strong>Teléfono:</strong>
            <span th:text="${
                orden.telefonoContacto != null &&
                !#strings.isEmpty(orden.telefonoContacto)
                    ? orden.telefonoContacto
                    : 'No cuenta con información registrada'
            }"></span>
        </p>

        <p>
            <strong>Dirección:</strong>
            <span th:text="${
                orden.direccionEntrega != null &&
                !#strings.isEmpty(orden.direccionEntrega)
                    ? orden.direccionEntrega
                    : 'No cuenta con información registrada'
            }"></span>
        </p>

    </div>

</div>

</body>
</html>
