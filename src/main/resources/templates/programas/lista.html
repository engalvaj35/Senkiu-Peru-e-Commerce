<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Programas Sociales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- GLOBAL -->
    <link rel="stylesheet" th:href="@{/css/layout-tienda.css}">

    <!-- ESPECÍFICO -->
    <link rel="stylesheet" th:href="@{/css/programas/lista.css}">
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/layout-tienda :: navbar}"></div>

<!-- CONTENIDO -->
<main class="programas-wrapper">

    <div class="container">

        <h1 class="titulo-seccion">Programas Sociales</h1>

        <div class="programas-grid">

            <div class="programa-card"
                 th:each="programa : ${programas}">

                <div class="programa-header">
                    <h2 th:text="${programa.nombre}">Nombre</h2>
                    <span class="programa-categoria"
                          th:text="${programa.categoriaNombre}">
                        Categoria
                    </span>
                </div>

                <p class="programa-desc"
                   th:text="${programa.descripcion}">
                    Descripción
                </p>

                <div class="programa-meta">
                    <div>
                        <span class="label">Meta</span>
                        <span class="value">
                            S/ <span th:text="${programa.objetivoMonto}"></span>
                        </span>
                    </div>

                    <div>
                        <span class="label">Avance</span>
                        <span class="value success">
                            <span th:text="${programa.porcentajeAvance}"></span>%
                        </span>
                    </div>
                </div>

                <div class="progress barra-avance">
                    <div class="progress-bar"
                         th:style="'width:' + ${programa.porcentajeAvance} + '%'">
                    </div>
                </div>

                <a class="btn-donar"
                   th:href="@{'/donaciones/nuevo/' + ${programa.id}}">
                    Donar ahora
                </a>

            </div>

        </div>

    </div>

</main>

<!-- FOOTER -->
<div th:replace="~{fragments/layout-tienda :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
