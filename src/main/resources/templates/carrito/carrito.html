<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mi Carrito</title>

    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-KI8DMbijtGX0fTcbdNgf8EpB3gQv7s0R5A&s" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
        }

        .cart-container {
            max-width: 900px;
            margin: auto;
        }

        .cart-title {
            font-weight: 800;
            margin-bottom: 25px;
            color: #019bff;
        }

        .cart-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item img {
            border-radius: 10px;
        }

        .item-info h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .item-info p {
            margin: 3px 0;
            font-size: 14px;
            color: #555;
        }

        .total-box {
            font-size: 20px;
            font-weight: 800;
            text-align: right;
            color: #00bc9b;
        }

        .btn-primary {
            background: linear-gradient(90deg, #019bff, #00bc9b);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            border-radius: 10px;
        }

        .cart-actions {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        </style>
</head>

<body>

<div class="cart-container">

    <h1 class="cart-title">Mi Carrito</h1>

    <div class="cart-box">

        <h4 th:text="${carrito.empresa}"></h4>

        <div th:if="${#lists.isEmpty(carrito.items)}">
            <p>El carrito está vacío.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <div th:each="item : ${carrito.items}" class="cart-item">

            <img th:src="${item.imagenUrl}" width="100">

            <div class="item-info flex-grow-1">

                <h3 th:text="${item.producto}"></h3>

                <p>Cantidad: <span th:text="${item.cantidad}"></span></p>
                <p>Precio: S/ <span th:text="${item.precio}"></span></p>
                <p>Subtotal: S/ <span th:text="${item.subtotal}"></span></p>

            </div>

            <form th:action="@{/carrito/eliminar-item/{id}(id=${item.itemId})}"
                  method="post">

                <button class="btn btn-danger btn-sm" type="submit">
                    Eliminar
                </button>

            </form>

        </div>

        <div class="total-box mt-3">
            Total: S/ <span th:text="${carrito.total}"></span>
        </div>

    </div>

    <div class="cart-box">

    <div class="cart-actions">

        <form th:action="@{/carrito/vaciar/{id}(id=${carrito.carritoId})}"
              method="post">

            <button class="btn btn-outline-danger">
                Vaciar carrito
            </button>

        </form>

    </div>

    <hr>

    <form th:action="@{/orden/crear/{empresaId}(empresaId=${carrito.empresaId})}"
            method="post">

            <!-- SOLO INVITADOS -->
            <div sec:authorize="isAnonymous()">

                <div class="mb-2">
                    <label>Email</label>
                    <input type="email"
                        name="email"
                        class="form-control"
                        required>
                </div>

                <div class="mb-2">
                    <label>Teléfono</label>
                    <input type="text"
                        name="telefono"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label>Dirección de entrega</label>
                    <textarea name="direccion"
                            class="form-control"
                            rows="3"
                            required></textarea>
                </div>

            </div>

            <select name="metodoPago"
                    class="form-select mb-3">

                <option value="MOCK">
                    Pago Mock
                </option>

                <option value="WALLET">
                    Créditos
                </option>

            </select>

            <button class="btn btn-primary w-100">
                Confirmar compra
            </button>

        </form>

        <div class="mt-3">
            <a href="/productos"
            class="btn btn-outline-secondary w-100">

                Volver a los productos

            </a>
        </div>

    </div>

</div>

</body>
</html>
